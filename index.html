<html>
<head>
<link rel="stylesheet" href="Style.css">
<title> Form Pendaftaran </title>
</head>
<body>
<div class="container">
    <h2> Form Pendaftaran </h2>
    <label> Nama Lengkap:</label>
       <input type="text" id="nama" placeholder="Contoh: Wilbert Castorius Kwok">
	<label> Kelas:</label>
       <input type="text" id="kelas" placeholder="Contoh: Secondary 4 Mark Zuckerberg">
    <div class="form-group">
		<label>Pilih Ekstrakurikuler</label>
		<div class="box">
			<label><input type="checkbox" name="sport" value="basket"> Basket</label>
			<label><input type="checkbox" name="sport" value="futsal"> Futsal</label>
			<label><input type="checkbox" name="sport" value="suara"> Paduan Suara</label>
		</div>
		<small>Pilih maksimal 3 ekstrakurikuler</small>
	</div>

	<div class="form-group">
		<label>Pilih Jadwal Belajar</label>
		<div class="box">
			<label><input type="radio" name="waktu" value="pagi"> Pagi (07:00 - 12:00)</label>
			<label><input type="radio" name="waktu" value="siang"> Siang (12:30 - 17:00)</label>
			<label><input type="radio" name="waktu" value="sore"> Sore (17:30 - 20:30)</label>
			<label><input type="radio" name="waktu" value="campuran"> Campuran</label>
		</div>
		<small>Wajib pilih satu jadwal</small>
	</div>
	<div class="button-group">
		<button id="tampil">Daftar Sekarang</button>
		<button id="reset">Reset Form</button>
	</div>
    <div class="result" id="hasil">
       Data muncul di sini
    </div>
	<script src="Script.js"></script>
</body>
</html>
